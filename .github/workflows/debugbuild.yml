name: Debug Build - Floaty

on:
  push:
    branches:
      - "**"

permissions:
  contents: write
  actions: read

jobs:
  VERSION_BUMP:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      skip_bump: ${{ steps.check_skip.outputs.skip }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if version bump should be skipped
        id: check_skip
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if [[ "$COMMIT_MSG" == *"--no-bump"* ]] || [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping version bump"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Proceeding with version bump"
          fi

      - name: Bump version
        if: steps.check_skip.outputs.skip != 'true'
        run: |
          set -euo pipefail
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r')
          echo "Current version line: $RAW"

          if [[ "$RAW" == *"+"* ]]; then
            NAME="${RAW%%+*}"
            BUILD="${RAW#*+}"
          else
            NAME="$RAW"
            # Legacy lines without +build: derive an integer build from patch.
            BUILD="${NAME##*.}"
          fi

          IFS='.' read -r major minor patch <<< "$NAME"
          NEW_PATCH=$((patch + 1))
          NEW_NAME="$major.$minor.$NEW_PATCH"
          NEW_BUILD=$((BUILD + 1))

          NEW_VERSION="${NEW_NAME}+${NEW_BUILD}"
          echo "New version: $NEW_VERSION"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Commit version bump
        if: steps.check_skip.outputs.skip != 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated version bump [skip ci]"
          push_options: "--force"

  IOS:
    name: iOS IPA
    runs-on: macos-latest
    needs: VERSION_BUMP
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull version bump commit
        if: needs.VERSION_BUMP.outputs.skip_bump != 'true'
        run: git pull --ff-only origin "${{ github.ref_name }}"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.4"
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Determine iOS flavor
        id: ios_flavor
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "release" ]]; then
            FLAVOR="production"
          elif [[ "$BRANCH" == "beta" ]]; then
            FLAVOR="beta"
          elif [[ "$BRANCH" == "nightly" ]]; then
            FLAVOR="nightly"
          elif [[ "$BRANCH" == "dev" ]]; then
            FLAVOR="development"
          else
            FLAVOR="nightly"
          fi
          echo "flavor=$FLAVOR" >> $GITHUB_OUTPUT
          echo "Building iOS with flavor: $FLAVOR"

      - name: Parse version from pubspec.yaml
        id: version
        run: |
          set -euo pipefail
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r')
          if [[ "$RAW" != *"+"* ]]; then
            echo "::error::pubspec version must use NAME+BUILD format (e.g. 0.0.10+10). Found: $RAW"
            exit 1
          fi
          VERSION_NAME="${RAW%%+*}"
          BUILD_NUMBER="${RAW#*+}"
          if ! [[ "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::iOS build number must be a positive integer. Found: $BUILD_NUMBER"
            exit 1
          fi
          echo "raw=$RAW" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version name: $VERSION_NAME, build: $BUILD_NUMBER"

      - name: Build iOS app
        run: |
          flutter build ios --release --no-codesign \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ steps.version.outputs.build }}" \
            --flavor ${{ steps.ios_flavor.outputs.flavor }} \
            --dart-define FLUTTER_FLAVOR=${{ github.ref_name }}

      - name: Package iOS IPA
        run: |
          VERSION_NAME="${{ steps.version.outputs.name }}"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          mkdir -p "dist/$VERSION_NAME"
          # Zip from repo root so entries are Payload/... not ../../Payload/...
          # (SideStore/AltStore fail with NSCocoaError 513 on parent-dir zip paths.)
          zip -r "dist/$VERSION_NAME/floaty-${VERSION_NAME}-ios.ipa" Payload
          rm -rf Payload
          ls -la "dist/$VERSION_NAME/"

      - name: Verify IPA archive layout
        run: |
          VERSION_NAME="${{ steps.version.outputs.name }}"
          IPA="dist/$VERSION_NAME/floaty-${VERSION_NAME}-ios.ipa"
          if unzip -l "$IPA" | awk 'NR>3 {print $4}' | grep -q '\.\./'; then
            echo "::error::IPA zip entries must not contain parent-directory paths (../)"
            exit 1
          fi
          if ! unzip -l "$IPA" | awk 'NR>3 && $4 != "" {print $4; exit}' | grep -q '^Payload/'; then
            echo "::error::IPA must contain Payload/ at archive root"
            unzip -l "$IPA" | head -10
            exit 1
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: dist/

  RELEASE:
    name: Publish IPA and OTA
    needs: IOS
    runs-on: ubuntu-latest
    if: needs.IOS.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull version bump commit
        run: git pull --ff-only origin "${{ github.ref_name }}"

      - name: Parse version from pubspec.yaml
        id: version
        run: |
          set -euo pipefail
          RAW=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' \r')
          VERSION_NAME="${RAW%%+*}"
          BUILD_NUMBER="${RAW#*+}"
          echo "raw=$RAW" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Determine release flavor label
        id: flavor
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "release" ]]; then
            echo "label=release" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "beta" ]]; then
            echo "label=beta" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "nightly" ]]; then
            echo "label=nightly" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "dev" ]]; then
            echo "label=development" >> $GITHUB_OUTPUT
          else
            echo "label=${BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ./artifacts

      - name: Stage release files
        run: |
          mkdir -p release/ios
          find ./artifacts -name "*.ipa" -exec cp {} release/ios/ \;
          ls -la release/ios/

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.flavor.outputs.label }}-v${{ steps.version.outputs.name }}-build${{ steps.version.outputs.build }}"
          name: "${{ steps.flavor.outputs.label }} v${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.build }})"
          body: |
            ## ${{ steps.flavor.outputs.label }} iOS build

            - Version: `${{ steps.version.outputs.name }}`
            - Build: `${{ steps.version.outputs.build }}`
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`

            Install on iPhone (OTA): https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          draft: false
          prerelease: ${{ github.ref_name != 'release' }}
          files: release/ios/*

      - name: Update OTA manifest for GitHub Pages
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          FLAVOR_LABEL: ${{ steps.flavor.outputs.label }}
        run: |
          set -euo pipefail
          TAG="${FLAVOR_LABEL}-v${VERSION_NAME}-build${BUILD_NUMBER}"
          IPA_FILE="floaty-${VERSION_NAME}-ios.ipa"
          IPA_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${IPA_FILE}"
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          MANIFEST_URL="${PAGES_URL}/manifest.plist"
          INSTALL_URL="itms-services://?action=download-manifest&url=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${MANIFEST_URL}', safe=''))")"
          INSTALL_URL_HTML="${INSTALL_URL//&/&amp;}"
          INSTALL_URL_SED="${INSTALL_URL_HTML//&/\\&}"

          cp docs/manifest.plist.template docs/manifest.plist
          sed -i "s|__IPA_URL__|${IPA_URL}|g" docs/manifest.plist
          sed -i "s|__BUILD_NUMBER__|${BUILD_NUMBER}|g" docs/manifest.plist

          cp docs/index.html.template docs/index.html
          sed -i "s|__VERSION__|${VERSION_NAME}|g" docs/index.html
          sed -i "s|__INSTALL_URL__|${INSTALL_URL_SED}|g" docs/index.html

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/manifest.plist docs/index.html
          if git diff --staged --quiet; then
            echo "OTA manifest already up to date"
          else
            git commit -m "chore: update OTA manifest for ${TAG} [skip ci]"
            git push
          fi
